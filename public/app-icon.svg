<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Cyan-Blue Metallic Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Accent Highlight Glow -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Subtle Inner Shadow Outer Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Ring Accents -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent-grad)" stroke-width="4" opacity="0.35" />
  
  <!-- Stylized Network/Connection Accents -->
  <line x1="128" y1="128" x2="384" y2="384" stroke="url(#accent-grad)" stroke-width="2" opacity="0.15" />
  <line x1="384" y1="128" x2="128" y2="384" stroke="url(#accent-grad)" stroke-width="2" opacity="0.15" />
  
  <!-- Central Emblem: Elegant Shield containing human attendance & security network -->
  <g transform="translate(144, 134)" filter="url(#glow)">
    <!-- Base Shield Icon -->
    <path d="M112,0 L16,36 L16,108 C16,174.4 56.8,236.4 112,252 C167.2,236.4 208,174.4 208,108 L208,36 L112,0 Z" fill="#0f172a" stroke="url(#accent-grad)" stroke-width="8" stroke-linejoin="round" />
    
    <!-- Shield Core Shimmer -->
    <path d="M112,8 L24,41 L24,108 C24,169 61.6,226.3 112,242.4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" />
    
    <!-- Inner Glowing Tech Nodes representing Management System -->
    <!-- Head / User Bubble -->
    <circle cx="112" cy="80" r="28" fill="url(#accent-grad)" />
    
    <!-- Body / Shoulders -->
    <path d="M64,166 C64,136 85.5,124 112,124 C138.5,124 160,136 160,166 C160,172 155,188 152,188 L72,188 C69,188 64,172 64,166 Z" fill="url(#accent-grad)" />
    
    <!-- Dynamic Speed/Tracking Ring -->
    <path d="M44,100 A 72 72 0 1 0 180,100" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 12" />
  </g>

  <!-- Bottom Stylized Brand Letters "EMS" in clean technical JetBrains Mono style -->
  <text x="256" y="444" font-family="'JetBrains Mono', 'Fira Code', 'Inter', monospace" font-size="34" font-weight="900" fill="#f8fafc" letter-spacing="8" text-anchor="middle" opacity="0.95">EMS</text>
  <text x="256" y="472" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#06b6d4" letter-spacing="4" text-anchor="middle" opacity="0.8">SECURED APP</text>
</svg>
